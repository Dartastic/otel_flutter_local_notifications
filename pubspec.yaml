name: otel_flutter_local_notifications
description: OpenTelemetry instrumentation for
  `package:flutter_local_notifications`. Wraps show / schedule / cancel
  with notification.* spans.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_flutter_local_notifications
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  flutter_test:
    sdk: flutter
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
